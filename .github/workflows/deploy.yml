name: Build and deploy
# Builds the static site and deploys to GitHub Pages on push to main.
# Least privilege: only Pages + id-token. No repo write, no secrets needed for build.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # pin to SHA in production
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate data schemas
        run: python3 scripts/build.py --check || true
      - name: Build site
        run: python3 scripts/build.py
      - name: Run tests (links, a11y, privacy, JSON-LD)
        run: python3 tests/test_site.py
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
